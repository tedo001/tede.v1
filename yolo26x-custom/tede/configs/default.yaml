# TEDE default training hyperparameters.
# All keys map directly to TEDE.train() / Trainer kwargs.

arch: retinanet            # retinanet | fcos | fasterrcnn | ssd
data: configs/dataset.yaml
project: runs/detect
name: tede

epochs: 100
batch: 8
imgsz: 640
device: ""                 # empty = auto (GPU if available, else CPU)
workers: 2                 # use 0 on low-RAM Windows
seed: 42
pretrained: true           # ImageNet-pretrained backbone (recommended)
amp: true                  # mixed precision when CUDA is available
save_period: 10
patience: 20

# Optimizer
optimizer: sgd             # sgd | adamw | adam
lr0: 0.005
weight_decay: 0.0001
momentum: 0.9
