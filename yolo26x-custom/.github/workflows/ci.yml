name: CI

on:
  push:
    branches: [main, develop, "feature/**", "experiment/**", "claude/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, validate and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the runner small and fast
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r yolo26x-custom/requirements.txt

      - name: Validate dataset.yaml
        run: |
          python -c "
          import sys, yaml
          cfg = yaml.safe_load(open('yolo26x-custom/configs/dataset.yaml'))
          required = {'path','train','val','nc','names'}
          missing = required - set(cfg)
          assert not missing, f'Missing keys in dataset.yaml: {missing}'
          assert isinstance(cfg['nc'], int) and cfg['nc'] > 0
          assert len(cfg['names']) == cfg['nc'], 'nc/names length mismatch'
          print('dataset.yaml OK')
          "

      - name: Lint with flake8
        working-directory: yolo26x-custom
        run: |
          flake8 src mlops tests --max-line-length=120 --extend-ignore=E203,W503 --statistics

      - name: Run unit tests
        working-directory: yolo26x-custom
        run: |
          pytest tests/ -v --tb=short --maxfail=3

  release-tag:
    name: Auto-tag on metric improvement
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag if model_registry/index.json shows improvement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REG=yolo26x-custom/model_registry/yolo26x_custom/index.json
          if [ ! -f "$REG" ]; then
            echo "No registry committed — skipping tag step."
            exit 0
          fi
          python - <<PY
          import json, subprocess
          idx = json.load(open("$REG"))
          best = idx.get('best')
          if not best:
              print('No best model recorded; skipping tag.')
              raise SystemExit(0)
          version = best['version']
          tag = f"model-{version}"
          existing = subprocess.run(['git','tag','-l',tag], capture_output=True, text=True).stdout.strip()
          if existing:
              print(f'Tag {tag} already exists.')
              raise SystemExit(0)
          subprocess.check_call(['git','tag',tag])
          subprocess.check_call(['git','push','origin',tag])
          print(f'Created tag {tag}.')
          PY
